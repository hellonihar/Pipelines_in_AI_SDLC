data_validation:
  min_rows: 10
  max_null_fraction: 0.05
  max_anomaly_rate: 0.10
  max_novel_category_rate: 0.20

evaluation:
  min_accuracy: 0.75
  min_precision: 0.70
  min_recall: 0.65
  min_f1: 0.70
  min_roc_auc: 0.75

drift:
  max_feature_drift_pvalue: 0.05
  max_psi: 0.20
  min_psi_samples: 30
